name: GitHub Pages

on:
  push:
    branches:
      - main  # Set a branch name to trigger deployment
  pull_request:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    concurrency:
      group: ${{ github.workflow }}-${{ github.ref }}
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v7
        with:
          submodules: true  # Fetch Hugo themes (true OR recursive)
          fetch-depth: 0    # Fetch all history for .GitInfo and .Lastmod

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: '0.58.3'
          extended: true

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
          # The action defaults to search for the dependency file (package-lock.json,
          # npm-shrinkwrap.json or yarn.lock) in the repository root, and uses its
          # hash as a part of the cache key.
          # https://github.com/actions/setup-node/blob/main/docs/advanced-usage.md#caching-packages-data
          cache-dependency-path: '**/package-lock.json'

      - name: Add npm packages
        run: npm install tailwindcss@latest postcss@latest postcss-cli@latest autoprefixer@latest

      - name: Build
        run: hugo --gc --minify

      - name: Generate CV PDF
        run: |
          # Serve the built site in the background (no -s: static mode, not SPA)
          npx serve ./public -l 8787 &
          SERVER_PID=$!
          # Wait until the server is actually responding
          for i in $(seq 1 10); do curl -s -o /dev/null http://localhost:8787/cv/ && break; sleep 1; done

          # Print /cv/ to PDF via headless Chrome (produces selectable text, ATS-friendly)
          google-chrome-stable --headless --disable-gpu --no-sandbox \
            --print-to-pdf=./public/christos-karamolegkos-cv-eng-raw.pdf \
            --no-pdf-header-footer \
            --run-all-compositor-stages-before-draw \
            --virtual-time-budget=10000 \
            http://localhost:8787/cv/

          kill $SERVER_PID || true

          # Optimize with Ghostscript (strip metadata bloat, compress fonts/images)
          sudo apt-get install -y -qq ghostscript > /dev/null
          gs -sDEVICE=pdfwrite -dCompatibilityLevel=1.5 \
            -dNOPAUSE -dBATCH -dQUIET \
            -dPrinted=false \
            -sOutputFile=./public/christos-karamolegkos-cv-eng.pdf \
            ./public/christos-karamolegkos-cv-eng-raw.pdf

          rm ./public/christos-karamolegkos-cv-eng-raw.pdf
          echo "PDF size: $(du -h ./public/christos-karamolegkos-cv-eng.pdf | cut -f1)"

      - name: Upload Pages artifact
        if: ${{ github.ref == 'refs/heads/main' }}
        uses: actions/upload-pages-artifact@v5
        with:
          path: ./public

      - name: Deploy to GitHub Pages
        if: ${{ github.ref == 'refs/heads/main' }}
        id: deploy
        uses: actions/deploy-pages@v5